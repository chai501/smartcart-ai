version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────
  mongo:
    image: mongo:7
    container_name: smartcart_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  # ── Node.js Backend ─────────────────────────
  backend:
    build: ./backend
    container_name: smartcart_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-ecommerce
      JWT_SECRET: ${JWT_SECRET}
      ML_SERVICE_URL: http://ml:8000
      FRONTEND_URL: http://localhost:3000
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
    depends_on:
      - mongo
      - ml

  # ── Python ML Service ───────────────────────
  ml:
    build: ./data-science
    container_name: smartcart_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data-science/models:/app/models
      - ./data-science/data:/app/data

  # ── React Frontend ───────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: smartcart_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
